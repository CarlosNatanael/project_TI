{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>{% if ticket %}Tratar Ticket #{{ ticket.id }}{% else %}Abrir Novo Ticket{% endif %}</h2>
    <form method="POST" id="ticketForm">
        
        <div class="form-group">
            <label>Solicitante:</label>
            <input type="text" name="solicitante" required placeholder="Ex: João da Silva" value="{{ ticket.solicitante if ticket else '' }}" class="campo-dinamico">
        </div>

        <div class="form-group">
            <label>Setor/Área:</label>
            <input type="text" name="setor" required placeholder="Ex: Financeiro, RH, Logística" value="{{ ticket.setor if ticket else '' }}" class="campo-dinamico">
        </div>

        <div class="form-group">
            <label>Assunto (Resumo):</label>
            <input type="text" name="assunto" required placeholder="Ex: Impressora sem conexão" value="{{ ticket.assunto if ticket else '' }}" class="campo-dinamico">
        </div>

        <div class="form-group">
            <label>Tipo:</label>
            <select name="tipo" required class="campo-dinamico">
                <option value="" disabled {% if not ticket %}selected{% endif %}>Selecione o tipo...</option>
                <option value="Incidente" {% if ticket and ticket.tipo == 'Incidente' %}selected{% endif %}>Incidente (Falha/Erro em algo existente)</option>
                <option value="Requisição" {% if ticket and ticket.tipo == 'Requisição' %}selected{% endif %}>Requisição (Pedido de novo acesso/equipamento)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Prioridade:</label>
            <select name="prioridade" required class="campo-dinamico">
                <option value="Baixa" {% if ticket and ticket.prioridade == 'Baixa' %}selected{% endif %}>Baixa</option>
                <option value="Média" {% if not ticket or (ticket and ticket.prioridade == 'Média') %}selected{% endif %}>Média</option>
                <option value="Alta" {% if ticket and ticket.prioridade == 'Alta' %}selected{% endif %}>Alta</option>
                <option value="Crítica" {% if ticket and ticket.prioridade == 'Crítica' %}selected{% endif %}>Crítica</option>
            </select>
        </div>

        <div class="form-group">
            <label>Descrição do Problema/Pedido:</label>
            <textarea name="descricao" rows="4" required class="campo-dinamico">{{ ticket.descricao if ticket else '' }}</textarea>
        </div>

        {% if ticket %}
            <hr style="margin: 20px 0; border: 1px solid var(--border-color);">
            <h3>Área do Técnico</h3>
            
            <div class="form-group">
                <label>Técnico Responsável:</label>
                <input type="text" name="tecnico" value="Lucas" readonly style="background-color: var(--table-header-bg); cursor: not-allowed; color: var(--text-color);">
            </div>

            <div class="form-group">
                <label>Status:</label>
                <select name="status" id="status_select">
                    <option value="Aberto" {% if ticket.status == 'Aberto' %}selected{% endif %}>Aberto</option>
                    <option value="Em andamento" {% if ticket.status == 'Em andamento' %}selected{% endif %}>Em andamento</option>
                    <option value="Pendente" {% if ticket.status == 'Pendente' %}selected{% endif %}>Pendente (Aguardando terceiros ou aprovação)</option>
                    <option value="Concluído" {% if ticket.status == 'Concluído' %}selected{% endif %}>Concluído</option>
                </select>
            </div>

            <div class="form-group" id="div_motivo" style="display: none; background: rgba(230, 126, 34, 0.1); padding: 10px; border-left: 4px solid #e67e22;">
                <label>Motivo da Pendência:</label>
                <textarea name="motivo_pendencia" id="motivo_pendencia" rows="2">{{ ticket.motivo_pendencia or '' }}</textarea>
            </div>

            <div class="form-group" id="div_solucao" style="display: none; background: rgba(39, 174, 96, 0.1); padding: 10px; border-left: 4px solid #27ae60;">
                <label>Solução Aplicada:</label>
                <textarea name="solucao_aplicada" id="solucao_aplicada" rows="3">{{ ticket.solucao_aplicada or '' }}</textarea>
            </div>
        {% endif %}

        <div class="botoes-container" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="btn-submit">
                {% if ticket %}Salvar Atendimento{% else %}Abrir Ticket{% endif %}
            </button>
            {% if ticket %}
                <a href="/consulta" class="btn-back" style="text-align: center;">Voltar</a>
                <a href="/excluir/{{ ticket.id }}" class="btn-submit" style="background-color: #e74c3c; text-decoration: none; text-align: center;" onclick="return confirm('Tem certeza que deseja EXCLUIR DEFINITIVAMENTE este ticket?');"> Excluir Ticket</a>
            {% endif %}
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const statusSelect = document.getElementById('status_select');
        const divMotivo = document.getElementById('div_motivo');
        const divSolucao = document.getElementById('div_solucao');
        const camposDinamicos = document.querySelectorAll('.campo-dinamico');

        function atualizarCampos() {
            if (!statusSelect) return;
            
            const statusAtual = statusSelect.value;
            const isConcluido = (statusAtual === 'Concluído');

            if (statusAtual === 'Pendente') {
                divMotivo.style.display = 'block';
                divSolucao.style.display = 'none';
            } else if (statusAtual === 'Concluído') {
                divSolucao.style.display = 'block';
                divMotivo.style.display = 'none';
            } else {
                divMotivo.style.display = 'none';
                divSolucao.style.display = 'none';
            }

            camposDinamicos.forEach(campo => {
                if (isConcluido) {
                    if (campo.tagName === 'SELECT') {
                        campo.style.pointerEvents = 'none';
                        campo.style.backgroundColor = 'var(--table-header-bg)';
                    } else {
                        campo.setAttribute('readonly', 'true');
                        campo.style.backgroundColor = 'var(--table-header-bg)';
                    }
                } else {
                    if (campo.tagName === 'SELECT') {
                        campo.style.pointerEvents = 'auto';
                        campo.style.backgroundColor = '';
                    } else {
                        campo.removeAttribute('readonly');
                        campo.style.backgroundColor = '';
                    }
                }
            });
        }

        if (statusSelect) {
            statusSelect.addEventListener('change', atualizarCampos);
            atualizarCampos();
        }
    });
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - TI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='processor.png') }}" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Suporte TI</a>
            <ul class="nav-links">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/">Novo Ticket</a></li>
                <li><a href="/consulta">Consultar</a></li>
                <li>
                    <button id="theme-toggle" class="theme-btn">
                        <span id="theme-icon">🌙</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy;Sistema de Chamados TI | 
            <a href="https://github.com/carlosnatanael" target="_blank" style="color: inherit; text-decoration: none;">
                <i class="bi bi-github"></i> carlosnatanael
            </a>
        </p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById("theme-toggle");
            const icon = document.getElementById("theme-icon");
            
            if (btn && icon) {
                const currentTheme = localStorage.getItem("theme");
                if (currentTheme === "dark") {
                    document.body.classList.add("dark-mode");
                    icon.textContent = "☀️";
                }
                btn.addEventListener('click', function() {
                    document.body.classList.toggle("dark-mode");
                    let theme = "light";
                    if (document.body.classList.contains("dark-mode")) {
                        theme = "dark";
                        icon.textContent = "☀️";
                    } else {
                        icon.textContent = "🌙";
                    }
                    localStorage.setItem("theme", theme);
                });
            }
        });
    </script>
</body>
</html>

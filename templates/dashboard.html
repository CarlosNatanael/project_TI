{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="list-container">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; gap: 10px;">
        <h2>Painel de Indicadores - TI</h2>
        <a href="/exportar" class="btn-submit" style="text-decoration: none; text-align: center; max-width: 250px; padding: 10px 20px;">
            <i class="bi bi-file-earmark-excel"></i> Exportar
        </a>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 2rem;">
        <div style="flex: 1; min-width: 140px; background: var(--table-header-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center;">
            <span style="font-size: 0.9rem; font-weight: bold; color: var(--text-color);">TOTAL</span>
            <p style="font-size: 2rem; font-weight: bold; margin-top: 5px;">{{ total }}</p>
        </div>
        <div style="flex: 1; min-width: 140px; background: rgba(192, 57, 43, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #c0392b; text-align: center;">
            <span style="font-size: 0.9rem; font-weight: bold; color: #c0392b;">ABERTOS</span>
            <p style="font-size: 2rem; font-weight: bold; margin-top: 5px; color: #c0392b;">{{ abertos }}</p>
        </div>
        <div style="flex: 1; min-width: 140px; background: rgba(41, 128, 185, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #2980b9; text-align: center;">
            <span style="font-size: 0.9rem; font-weight: bold; color: #2980b9;">ANDAMENTO</span>
            <p style="font-size: 2rem; font-weight: bold; margin-top: 5px; color: #2980b9;">{{ em_andamento }}</p>
        </div>
        <div style="flex: 1; min-width: 140px; background: rgba(230, 126, 34, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #e67e22; text-align: center;">
            <span style="font-size: 0.9rem; font-weight: bold; color: #e67e22;">PENDENTES</span>
            <p style="font-size: 2rem; font-weight: bold; margin-top: 5px; color: #e67e22;">{{ pendentes }}</p>
        </div>
        <div style="flex: 1; min-width: 140px; background: rgba(39, 174, 96, 0.1); padding: 20px; border-radius: 8px; border: 1px solid #27ae60; text-align: center;">
            <span style="font-size: 0.9rem; font-weight: bold; color: #27ae60;">CONCLUÍDOS</span>
            <p style="font-size: 2rem; font-weight: bold; margin-top: 5px; color: #27ae60;">{{ concluidos }}</p>
        </div>
    </div>

    <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 2rem;">
        <div style="flex: 2; min-width: 300px; background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px;">
            <h3 style="font-size: 1.1rem; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;">Tickets por Setor</h3>
            <canvas id="graficoSetor" style="max-height: 300px;"></canvas>
        </div>

        <div style="flex: 1; min-width: 300px; background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px;">
            <h3 style="font-size: 1.1rem; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 5px;">Volume por Assunto/Tag</h3>
            <canvas id="graficoTag" style="max-height: 300px;"></canvas>
        </div>
    </div>
</div>

<script>
    Chart.defaults.color = '#888';

    // Gráfico de Setores
    const ctxSetor = document.getElementById('graficoSetor').getContext('2d');
    new Chart(ctxSetor, {
        type: 'bar',
        data: {
            labels: {{ labels_setor | tojson }},
            datasets: [{
                label: 'Quantidade',
                data: {{ valores_setor | tojson }},
                backgroundColor: '#3498db',
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });

    // Gráfico de Tags
    const ctxTag = document.getElementById('graficoTag').getContext('2d');
    new Chart(ctxTag, {
        type: 'doughnut',
        data: {
            labels: {{ labels_tags | tojson }},
            datasets: [{
                data: {{ valores_tags | tojson }},
                backgroundColor: {{ cores_grafico | tojson }}, /* <--- A mágica acontece aqui */
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
{% endblock %}
